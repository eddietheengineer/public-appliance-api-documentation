name: Validate Device Classes

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate ha_domain/device_class combinations
        run: python3 validate_device_classes.py

      - name: Validate ERD pairing symmetry
        run: python3 validate_pairings.py

      - name: Validate HA metadata completeness
        run: python3 validate_ha_completeness.py

      - name: Validate scaling factor consistency
        run: python3 validate_scaling_consistency.py

      - name: Validate HA domain-specific rules
        run: python3 validate_ha_domain_rules.py

      - name: Generate coverage report
        if: always()
        run: python3 generate_coverage_report.py
